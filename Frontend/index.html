<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="styles.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI & Health Tracker</title>
    <style>
        :root {
    --bg-gradient: linear-gradient(135deg, #f5f7fb 0%, #e4ecf7 100%);
    --card-bg: #ffffff;
    --text-main: #2c3e50;
    --text-muted: #7f8c8d;
    --primary: #4a90e2;
    --primary-hover: #357abd;
    --secondary: #95a5a6;
    --secondary-hover: #7f8c8d;
    --success: #2ecc71;
    --danger: #e74c3c;
    --danger-hover: #c0392b;
    --shadow: 0 10px 30px rgba(163, 177, 198, 0.35);
    --radius: 12px;
    --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
}

body { 
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
    margin: 0; 
    padding: 40px 20px;
    background: var(--bg-gradient); 
    color: var(--text-main);
    min-height: 100vh;
    box-sizing: border-box;
}

/* --- ANIMATIONS --- */
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.02); }
    100% { transform: scale(1); }
}

/* --- LEAVING ANIMATION FOR THE AUTH BOX --- */
@keyframes fadeOutDown {
    from {
        opacity: 1;
        transform: translateY(0);
    }
    to {
        opacity: 0;
        transform: translateY(30px); /* Slides downward while vanishing */
    }
}

.auth-box.fade-out {
    animation: fadeOutDown 0.4s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
}

/* --- STYLIZED AUTH BOX --- */
.auth-box { 
    max-width: 400px; 
    margin: 60px auto; 
    background: var(--card-bg); 
    padding: 40px; 
    border-radius: var(--radius); 
    box-shadow: var(--shadow);
    animation: fadeInUp 0.5s var(--transition);
}

/* --- DASHBOARD LAYOUT --- */
.nav-header { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    max-width: 1100px; 
    margin: 0 auto 30px auto; 
    padding-bottom: 20px;
    border-bottom: 2px solid rgba(0,0,0,0.05);
    animation: fadeInUp 0.4s var(--transition);
}

.container { 
    display: flex; 
    gap: 30px; 
    max-width: 1100px; 
    margin: 0 auto; 
}

@media (max-width: 76EDpx) {
    .container { flex-direction: column; }
}

.box { 
    background: var(--card-bg); 
    padding: 30px; 
    border-radius: var(--radius); 
    box-shadow: var(--shadow); 
    flex: 1; 
    transition: var(--transition);
    animation: fadeInUp 0.6s var(--transition);
}

.box:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 35px rgba(163, 177, 198, 0.45);
}

h1, h2, h3 { margin-top: 0; color: var(--text-main); font-weight: 700; }

/* --- SMOOTH INPUTS & BUTTONS --- */
label { font-weight: 600; font-size: 13px; color: var(--text-muted); display: block; margin-top: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
input, select, button { width: 100%; padding: 12px 16px; margin: 8px 0; border: 2px solid #e4ecf7; border-radius: var(--radius); box-sizing: border-box; font-size: 15px; transition: var(--transition); outline: none; }

input:focus, select:focus {
    border-color: var(--primary);
    background-color: #fafbfc;
    box-shadow: 0 0 0 4px rgba(74, 144, 226, 0.15);
}

button { background-color: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
button:hover { background-color: var(--primary-hover); transform: translateY(-2px); }
button:active { transform: translateY(0); }

.btn-secondary { background-color: var(--secondary); margin-top: 4px; }
.btn-secondary:hover { background-color: var(--secondary-hover); }

.search-group { display: flex; gap: 10px; margin-bottom: 20px; }
.search-group input { margin: 0; }
.search-group button { width: auto; margin: 0; background-color: var(--success); }
.search-group button:hover { background-color: #27ae60; }

/* --- PREMIUM TABLE SYSTEM --- */
table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #fff; border-radius: var(--radius); overflow: hidden; }
th, td { text-align: left; padding: 16px; font-size: 14px; }
th { background-color: #f8fafc; color: var(--text-muted); font-weight: 600; text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px; border-bottom: 2px solid #e4ecf7; }
td { border-bottom: 1px solid #edf2f7; }
tr:last-child td { border-bottom: none; }
tr { transition: var(--transition); }
tr:hover td { background-color: #f8fafc; color: #000; }

/* --- DYNAMIC STATUS CHIPS --- */
.status-msg { font-weight: bold; margin-top: 15px; font-size: 14px; padding: 10px; border-radius: 6px; text-align: center; display: none; }
.status-msg:not(:empty) { display: block; animation: pulse 0.3s ease-in-out; }

/* Modern BMI Category Badges */
.badge {
    padding: 6px 12px;
    border-radius: 20px;
    font-weight: bold;
    font-size: 12px;
    display: inline-block;
}
.badge-normal { background-color: #e8f8f0; color: #2ecc71; }
.badge-underweight { background-color: #fef9e7; color: #f1c40f; }
.badge-overweight { background-color: #fdf2e9; color: #e67e22; }
.badge-obese { background-color: #fdedec; color: #e74c3c; }

.logout-btn { width: auto; padding: 10px 24px; background-color: var(--danger); margin: 0; }
.logout-btn:hover { background-color: var(--danger-hover); }

    </style>
</head>
<body>

    <!-- SCREEN 1: AUTHENTICATION (VISIBLE BY DEFAULT) -->
    <div id="authContainer" class="auth-box">
        <h2 id="authTitle">Login to Health Tracker</h2>
        <form id="authForm">
            <label>Email Address:</label>
            <input type="email" id="authEmail" required placeholder="Enter email">
            
            <label>Password (min 6 chars):</label>
            <input type="password" id="authPassword" required placeholder="Enter password">
            
            <button type="submit" id="mainAuthBtn">Login</button>
            <button type="button" class="btn-secondary" id="toggleAuthBtn" onclick="toggleAuthMode()">Create an Account</button>
        </form>
        <div id="authStatus" class="status-msg"></div>
    </div>

    <!-- SCREEN 2: MAIN DASHBOARD (HIDDEN UNTIL LOGIN) -->
    <div id="dashboardContainer" style="display: none;">
        <div class="nav-header">
            <h1 style="color: #2c3e50; margin: 0;">BMI & Health Record Tracker</h1>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>

        <div class="container">
            <!-- LEFT: Add New Record Form -->
            <div class="box">
                <h2>Add Health Record</h2>
                <form id="healthForm" class="slide-in-left">
                    <label>Roll Number:</label>
                    <input type="number" id="rollNo" required min="1">
                    
                    <label>Full Name:</label>
                    <input type="text" id="name" required minlength="1">
                    
                    <label>Weight (kg):</label>
                    <input type="number" id="weight" step="0.1" required min="0.1">
                    
                    <label>Height (cm):</label>
                    <input type="number" id="height" step="0.1" required min="0.1">
                    
                    <button type="submit">Calculate & Save</button>
                </form>
                <div id="formStatus" class="status-msg"></div>
            </div>

            <!-- RIGHT: View Personal Records -->
            <div class="box slide-in-right" style="flex: 1.5;">
                <h2>Your Health History</h2>
                <div class="search-group">
    <!-- Changed type="text" to type="date" for an interactive calendar dropdown -->
    <input type="date" id="searchDate">
    <button type="button" onclick="searchRecordsByDate()">Search</button>
    <button type="button" onclick="clearDateSearch()" style="background-color: #7f8c8d;">Clear</button>
</div>
<div id="searchMessage" style="color: #e74c3c; font-weight: bold; margin-top: 10px; font-size: 14px;"></div>



                <table>
                    <thead>
                        <tr>
                            <th>Roll No</th>
                            <th>Name</th>
                            <th>BMI</th>
                            <th>Category</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="recordsTableBody">
                        <!-- User-specific records injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
